{% extends "base.html" %}

{% block content %}

<h1>Nova viagem</h1>

<section class="acoes">

    <button onclick="window.location.href='/viagens'">
        ← Voltar
    </button>

</section>


<section class="card">

<form method="POST">

    <div class="form-group">
        <label>Nome da viagem</label>
        <input type="text" name="nome" required minlength="3" maxlength="120">
    </div>

    <div class="form-group">
        <label>Data da viagem</label>
        <input type="date" name="data_viagem" required>
    </div>

    <div class="form-group">
        <label>Observações</label>
        <textarea name="observacoes" rows="4" maxlength="500"></textarea>
    </div>

    <button type="submit" class="btn-submit">
        Criar viagem
    </button>

</form>

</section>

{% endblock %}
