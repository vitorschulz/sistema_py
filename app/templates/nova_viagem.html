{% extends "base.html" %}

{% block content %}

<h1>{{ "Editar viagem" if viagem else "Nova viagem" }}</h1>

<section class="acoes">

    <button onclick="window.location.href='/viagens'">
        ← Voltar
    </button>

</section>


<section class="card">

<form method="POST">

    <div class="form-group">
        <label>Nome da viagem</label>
        <input type="text" name="nome" required minlength="3" maxlength="120"  value="{{ viagem.nome if viagem }}">
    </div>

    <div class="form-group">
        <label>Data da viagem</label>
        <input type="date" name="data_viagem" required value="{{ viagem.data_viagem if viagem }}">
    </div>

    <div class="form-group">
        <label>Observações</label>
        <textarea name="observacoes" rows="4" maxlength="500">{{ viagem.observacoes if viagem }}</textarea>
    </div>

    <button type="submit" class="btn-submit">
        {{ "Criar viagem" if not viagem else "Atualizar viagem" }}
    </button>

</form>

</section>

{% endblock %}
