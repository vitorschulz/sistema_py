{% extends "base.html" %}

{% block content %}

<h1>Clientes</h1>

<section class="acoes">

    <button onclick="window.location.href='/clientes/novo'">
        + Novo cliente
    </button>

    <input type="text" id="campo-busca" placeholder="Buscar..." onkeyup="filtrarTabela()" >

</section>



<section class="card">

    <table id="tabela-lista">

        <tr class="thead-hover">

           <th>
                <a class="tabela-link"
                href="{{ url_for('clientes.listar_clientes', sort='nome', order=proxima_ordem_nome) }}">
                    <strong>Nome</strong>
                </a>
            </th>

            <th>
                <a class="tabela-link"
                href="{{ url_for('clientes.listar_clientes', sort='cpf_cnpj', order=proxima_ordem_cpf) }}">
                    <strong>CPF/CNPJ</strong>
                </a>
            </th>

            <th>
                <a class="tabela-link"
                href="{{ url_for('clientes.listar_clientes', sort='telefone', order=proxima_ordem_telefone) }}">
                    <strong>Telefone</strong>
                </a>
            </th>

            <th>
                <a class="tabela-link"
                href="{{ url_for('clientes.listar_clientes', sort='endereco', order=proxima_ordem_endereco) }}">
                    <strong>Endereço</strong>
                </a>
            </th>

            <th>Ações</th>

        </tr>

        {% for cliente in clientes %}

        <tr class="linha-clicavel">

            <td>
                <a href="/clientes/{{ cliente.id }}" class="tabela-link">
                    {{ cliente.nome }}
                </a>
            </td>
            <td>{{ cliente.cpf_cnpj or "—" }}</td>
            <td>{{ cliente.telefone or "—" }}</td>
            <td>{{ cliente.endereco or "—" }}</td>

            <td class="acoes-tabela">

                <a href="/clientes/{{ cliente.id }}/editar" class="btn-editar">
                Editar
                </a>

                <a href="/clientes/{{ cliente.id }}/excluir"
                class="btn-excluir" 
                data-confirm="Deseja excluir este cliente?">
                Excluir
                </a>

            </td>

        </tr>

        {% endfor %}

    </table>

</section>

<script src="{{ url_for('static', filename='js/busca.js') }}"></script>

{% endblock %}
