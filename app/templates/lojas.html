{% extends "base.html" %}

{% block content %}

<h1>Lojas</h1>

<section class="acoes">

    <button onclick="window.location.href='/lojas/novo'">
        + Nova loja
    </button>

    <input type="text" id="campo-busca" placeholder="Buscar..." onkeyup="filtrarTabela()" >

</section>



<section class="card">

<table id="tabela-lista">

    <tr class="thead-hover">
        <th>Loja</th>
        <th>Shopping</th>
        <th>Telefone</th>
        <th>Observação</th>
        <th>Ações</th>
    </tr>

    {% for loja in lojas %}

    <tr class="linha-clicavel">

        <td> 
            <a href="/lojas/{{ loja.id }}" class="tabela-link">
            {{ loja.nome }}
            </a>
        </td>

        <td>{{ loja.shopping_nome or "Sem shopping" }}</td>

        <td>{{ loja.contato or "—" }}</td>

        <td>{{ loja.observacoes or "—" }}</td>

        <td class="acoes-tabela">

        <a href="/lojas/{{ loja.id }}/editar" class="btn-editar">
        Editar
        </a>

        <a href="/lojas/{{ loja.id }}/excluir"
        class="btn-excluir"
        onclick="return confirm('Excluir esta loja?')">
        Excluir
        </a>

        </td>

    </tr>

{% endfor %}

</table>

</section>

<script src="{{ url_for('static', filename='js/busca.js') }}"></script>

{% endblock %}
