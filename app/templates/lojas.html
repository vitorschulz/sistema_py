{% extends "base.html" %}

{% block content %}

<h1>Lojas</h1>

<section class="acoes">

    <button onclick="window.location.href='/lojas/novo'">
        + Nova loja
    </button>

    <input type="text" id="campo-busca" placeholder="Buscar..." onkeyup="filtrarTabela()" >

</section>



<section class="card">

    <table id="tabela-lista">

        <tr class="thead-hover">

            <th>
                <a class="tabela-link"
                href="{{ url_for('lojas.listar_lojas', sort='nome', order=proxima_ordem_nome) }}">
                    <strong>Loja</strong>
                </a>
            </th>

            <th>
                <a class="tabela-link"
                href="{{ url_for('lojas.listar_lojas', sort='shopping_nome', order=proxima_ordem_shopping) }}">
                    <strong>Shopping</strong>
                </a>
            </th>

            <th>
                <a class="tabela-link"
                href="{{ url_for('lojas.listar_lojas', sort='contato', order=proxima_ordem_contato) }}">
                    <strong>Telefone</strong>
                </a>
            </th>

            <th>
                <a class="tabela-link"
                href="{{ url_for('lojas.listar_lojas', sort='observacoes', order=proxima_ordem_observacao) }}">
                    <strong>Observação</strong>
                </a>
            </th>

            <th>Ações</th>

        </tr>

        {% for loja in lojas %}

        <tr class="linha-clicavel">

            <td> 
                <a href="/lojas/{{ loja.id }}" class="tabela-link">
                {{ loja.nome }}
                </a>
            </td>

            <td>{{ loja.shopping_nome or "Sem shopping" }}</td>

            <td>{{ loja.contato or "—" }}</td>

            <td>{{ loja.observacoes or "—" }}</td>

            <td class="acoes-tabela">

            <a href="/lojas/{{ loja.id }}/editar" class="btn-editar">
            Editar
            </a>

            <a href="/lojas/{{ loja.id }}/excluir"
            class="btn-excluir" data-confirm="Deseja excluir esta loja?">
            Excluir
            </a>

            </td>

        </tr>

    {% endfor %}

    </table>

</section>

<script src="{{ url_for('static', filename='js/busca.js') }}"></script>

{% endblock %}
